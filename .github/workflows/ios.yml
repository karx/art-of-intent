name: iOS — Build & Archive

on:
  push:
    tags: ['v*']          # Release builds on version tags
  workflow_dispatch:       # Manual trigger
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release]

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build iOS
    runs-on: macos-15      # Xcode 16 — matches current App Store requirement

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install root dependencies (Capacitor CLI)
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend tests
        run: npx vitest run
        working-directory: frontend

      - name: Build web assets
        run: npm run build
        working-directory: frontend

      - name: Sync Capacitor
        run: npx cap sync ios

      # ── Code signing (release only) ───────────────────────────────────────
      - name: Install Apple certificate and provisioning profile
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.build_type == 'release'
        env:
          BUILD_CERTIFICATE_BASE64:       ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          P12_PASSWORD:                   ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD:              ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/build_cert.p12
          PP_PATH=$RUNNER_TEMP/pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64"       | base64 --decode -o "$CERT_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A \
            -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles

      # ── Debug build ───────────────────────────────────────────────────────
      - name: Build debug (simulator)
        if: ${{ github.event.inputs.build_type != 'release' && !startsWith(github.ref, 'refs/tags/') }}
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath ios/DerivedData \
            build
        env:
          CODE_SIGNING_ALLOWED: NO

      # ── Release archive ───────────────────────────────────────────────────
      - name: Archive (release)
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.build_type == 'release'
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath ios/App.xcarchive \
            archive

      - name: Export IPA
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.build_type == 'release'
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath ios/App.xcarchive \
            -exportPath ios/ipa \
            -exportOptionsPlist ios/ExportOptions.plist

      - name: Upload IPA
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: App-${{ github.ref_name }}.ipa
          path: ios/ipa/*.ipa
          retention-days: 90

      # ── Cleanup keychain ──────────────────────────────────────────────────
      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
