<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Insights — Art of Intent</title>
  <link rel="stylesheet" href="src/css/dos-theme.css">
  <style>
    body { max-width: 1100px; margin: 0 auto; padding: var(--spacing-md); }

    /* ── Auth Gate ── */
    .auth-gate {
      max-width: 420px;
      margin: 80px auto;
      border: 2px solid var(--border-color);
      background: var(--bg-secondary);
      padding: var(--spacing-xl);
      text-align: center;
    }
    .auth-gate h1 { font-size: 15px; color: var(--dos-cyan); margin-bottom: var(--spacing-md); }
    .auth-gate h1::before { content: '> '; color: var(--dos-yellow); }
    #auth-message {
      font-size: 12px;
      color: var(--text-dim);
      white-space: pre-wrap;
      margin-bottom: var(--spacing-md);
      min-height: 1.4em;
    }
    #btn-google-signin {
      padding: var(--spacing-sm) var(--spacing-lg);
      background: var(--bg-primary);
      color: var(--dos-green);
      border: 1px solid var(--dos-green);
      font-family: inherit;
      font-size: 13px;
      text-transform: uppercase;
      cursor: pointer;
      letter-spacing: 1px;
    }
    #btn-google-signin:hover { background: var(--dos-green); color: var(--dos-black); }

    /* ── Dashboard Header ── */
    .insights-header {
      border: 2px solid var(--border-color);
      background: var(--bg-secondary);
      padding: var(--spacing-md);
      margin-bottom: var(--spacing-md);
      display: flex;
      align-items: center;
      gap: var(--spacing-lg);
      flex-wrap: wrap;
    }
    .insights-header h1 {
      font-size: 15px;
      color: var(--dos-cyan);
      margin: 0;
      flex: 1;
      white-space: nowrap;
    }
    .insights-header h1::before { content: '> '; color: var(--dos-yellow); }
    .header-meta { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
    .date-controls { display: flex; align-items: center; gap: var(--spacing-sm); flex-wrap: wrap; }
    .date-controls label { font-size: 12px; color: var(--text-dim); }
    .date-controls input[type="date"] {
      background: var(--bg-primary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      font-family: inherit;
      font-size: 13px;
      padding: 3px 6px;
    }
    .btn-preset.active { background: var(--dos-cyan); color: var(--dos-black); }
    .btn-day {
      background: var(--bg-primary);
      color: var(--dos-cyan);
      border: 1px solid var(--border-color);
      font-family: inherit;
      font-size: 12px;
      padding: 3px 8px;
      cursor: pointer;
    }
    .btn-day:hover { background: var(--dos-cyan); color: var(--dos-black); }
    #btn-reload {
      background: var(--bg-primary);
      color: var(--dos-yellow);
      border: 1px solid var(--dos-yellow);
      font-family: inherit;
      font-size: 12px;
      padding: 3px 10px;
      cursor: pointer;
      text-transform: uppercase;
    }
    #btn-reload:hover { background: var(--dos-yellow); color: var(--dos-black); }

    /* ── Panels ── */
    .panel {
      border: 2px solid var(--border-color);
      background: var(--bg-secondary);
      margin-bottom: var(--spacing-md);
    }
    .panel-header {
      padding: var(--spacing-sm) var(--spacing-md);
      border-bottom: 1px solid var(--border-color);
      font-size: 13px;
      color: var(--dos-cyan);
      text-transform: uppercase;
    }
    .panel-header::before { content: '> '; color: var(--dos-yellow); }
    .panel-body { padding: var(--spacing-md); }

    .panels-half {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-md);
    }
    .panels-half .panel { margin-bottom: 0; }
    @media (max-width: 760px) { .panels-half { grid-template-columns: 1fr; } }

    /* ── Chart Output ── */
    pre.chart {
      font-family: inherit;
      font-size: 12px;
      color: var(--text-primary);
      white-space: pre;
      overflow-x: auto;
      margin: 0;
      line-height: 1.5;
    }
    .dim { color: var(--text-dim); }
    .err { color: var(--error-color); }
    .win { color: var(--dos-green); }
    .loss { color: var(--error-color); }

    /* ── Session Browser ── */
    .sessions-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      margin-bottom: var(--spacing-sm);
      color: var(--text-dim);
    }
    .sessions-nav button {
      background: var(--bg-primary);
      color: var(--dos-cyan);
      border: 1px solid var(--border-color);
      font-family: inherit;
      font-size: 11px;
      padding: 2px 8px;
      cursor: pointer;
      margin: 0 4px;
    }
    .sessions-nav button:hover { background: var(--dos-cyan); color: var(--dos-black); }
    .sessions-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .sessions-table th {
      text-align: left;
      color: var(--dos-cyan);
      border-bottom: 1px solid var(--border-color);
      padding: 4px 8px;
      font-weight: normal;
      text-transform: uppercase;
    }
    .sessions-table td {
      padding: 4px 8px;
      border-bottom: 1px solid var(--bg-primary);
      vertical-align: top;
    }
    .sess-row:hover td { background: var(--bg-primary); cursor: pointer; }
    .sess-detail.hidden { display: none; }
    .sess-detail td { padding: 0; background: var(--bg-primary); }
    .sess-detail-inner { padding: var(--spacing-sm); }
    pre.att-trail {
      font-family: inherit;
      font-size: 11px;
      color: var(--text-dim);
      white-space: pre-wrap;
      margin: 0;
      line-height: 1.6;
    }
    pre.att-trail .found { color: var(--dos-green); }
    pre.att-trail .viol { color: var(--error-color); }
    .btn-expand {
      background: none;
      border: 1px solid var(--border-color);
      color: var(--text-dim);
      font-family: inherit;
      font-size: 12px;
      padding: 0 5px;
      cursor: pointer;
      line-height: 1.4;
    }
    .btn-expand:hover { color: var(--dos-cyan); border-color: var(--dos-cyan); }
  </style>
</head>
<body>

  <!-- Auth Gate -->
  <div id="auth-gate" class="auth-gate">
    <h1>INSIGHTS</h1>
    <p id="auth-message"></p>
    <button id="btn-google-signin">[ Sign in with Google ]</button>
    <p style="font-size:11px;color:var(--text-dim);margin-top:var(--spacing-lg);">
      Admin access only. Not linked from the main game.
    </p>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" style="display:none">

    <div class="insights-header">
      <h1>INSIGHTS // ART OF INTENT</h1>
      <span class="header-meta">UID: <span id="admin-uid">—</span></span>
      <div class="date-controls">
        <label>FROM:</label>
        <input type="date" id="date-start">
        <label>TO:</label>
        <input type="date" id="date-end">
        <button class="btn-day btn-preset" id="btn-preset-today">TODAY</button>
        <button class="btn-day btn-preset" id="btn-preset-7d">7 DAYS</button>
        <button class="btn-day btn-preset" id="btn-preset-30d">30 DAYS</button>
        <button id="btn-reload">↻ RELOAD</button>
      </div>
    </div>

    <!-- Panel: Daily Snapshot -->
    <div class="panel">
      <div class="panel-header">Daily Snapshot</div>
      <div class="panel-body" id="panel-snapshot-body">
        <span class="dim">[—]</span>
      </div>
    </div>

    <!-- Panels: Word Difficulty + Prompt Patterns (2-col) -->
    <div class="panels-half">
      <div class="panel">
        <div class="panel-header">Word Difficulty</div>
        <div class="panel-body" id="panel-words-body"><span class="dim">[—]</span></div>
      </div>
      <div class="panel">
        <div class="panel-header">Prompt Patterns</div>
        <div class="panel-body" id="panel-prompts-body"><span class="dim">[—]</span></div>
      </div>
    </div>

    <!-- Panels: Violations + Attempt Distribution (2-col) -->
    <div class="panels-half">
      <div class="panel">
        <div class="panel-header">Violation Patterns</div>
        <div class="panel-body" id="panel-violations-body"><span class="dim">[—]</span></div>
      </div>
      <div class="panel">
        <div class="panel-header">Attempt Distribution</div>
        <div class="panel-body" id="panel-attempts-body"><span class="dim">[—]</span></div>
      </div>
    </div>

    <!-- Panel: Token Efficiency Distribution -->
    <div class="panel">
      <div class="panel-header">Token Efficiency Distribution</div>
      <div class="panel-body" id="panel-efficiency-body"><span class="dim">[—]</span></div>
    </div>

    <!-- Panel: Session Browser -->
    <div class="panel">
      <div class="panel-header">Session Browser</div>
      <div class="panel-body" id="panel-sessions-body"><span class="dim">[—]</span></div>
    </div>

  </div>

  <script type="module" src="src/js/insights.js"></script>
</body>
</html>
