<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#0d1117" />
		<meta name="robots" content="index, follow" />
		<meta name="author" content="Art of Intent" />

		<!-- Favicons -->
		<link rel="icon" type="image/svg+xml" href="/favicon-32x32.svg" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
		<link rel="manifest" href="/site.webmanifest" />

		<!-- Default OG / Twitter (overridden per-page via <svelte:head>) -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Art of Intent" />
		<meta property="og:locale" content="en_US" />
		<meta property="og:image" content="https://art-of-intent.netlify.app/og_image.png" />
		<meta property="og:image:secure_url" content="https://art-of-intent.netlify.app/og_image.png" />
		<meta property="og:image:type" content="image/png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:image:alt" content="Art of Intent — Daily AI word puzzle" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:site" content="@artofintent" />
		<meta name="twitter:image" content="https://art-of-intent.netlify.app/og_image.png" />
		<meta name="twitter:image:alt" content="Art of Intent — Daily AI word puzzle" />

		<link rel="stylesheet" href="/dos-theme.css" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
