[build]
  base    = "frontend"
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — SvelteKit handles all routes client-side
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Cache rules ───────────────────────────────────────────────────────────────

# Vite fingerprinted assets — cache forever (hash changes on every rebuild)
[[headers]]
  for = "/_app/immutable/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Entry point — always revalidate so new deploys are picked up immediately
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Service worker — never cache so updates are applied immediately
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# PWA manifest — short TTL so icon/name changes propagate quickly
[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Static assets (images, fonts, icons) — cache for a week
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# ── Security headers (all pages) ─────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(self), geolocation=()"
